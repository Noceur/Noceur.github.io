<body>
    <!-- Scroll anchor for the floating "↑ Top" pill -->

    <!-- ============================================================
         Tab routing radios. Hidden, no scroll trigger. Labels below

    <input type="radio" name="tab" id="r-portfolio" class="tab-route">
    <input type="radio" name="tab" id="r-journals" class="tab-route">
    <input type="radio" name="tab" id="r-contact" class="tab-route">

    <!-- ============================================================
         META BAR — left edge of viewport, not the centered shell
         ============================================================ -->

    <main class="shell">

             SITE HEADER

                <span class="role">Technical Level Designer</span> with a sprinkle of tools programming 
                <!-- // Former Level Designer at
                <span class="studio">Sandbox Interactive</span>,
                <span class="studio">Stratosphere Games</span> &amp;
                <span class="studio">Spectarium</span>. -->

        </header>

        <!-- ============================================================
             TABS — clicking a label flips the corresponding radio
             ============================================================ -->

                    <svg viewBox="0 0 16 16"><path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783"/></svg>
                </span>

            </label>
            <label class="tab" for="r-portfolio">
                <span class="ico" aria-hidden="true">
                    <svg viewBox="0 0 16 16"><path d="M14.12 10.163 1.547 5.176a.5.5 0 0 1 0-.352l6.149-2.43a1 1 0 0 1 .608 0l6.15 2.43a.5.5 0 0 1 0 .352l-.243.097-1.297.51-4.85 1.918a1.5 1.5 0 0 1-1.094 0L4.146 5.844zm0 4.376L1.547 9.552a.5.5 0 0 1 .035-.927l3.213-1.27 4.13 1.632a2 2 0 0 0 1.46 0l4.131-1.632 3.213 1.27a.5.5 0 0 1 .035.927zM1.547 12.928a.5.5 0 0 0 .035.927L8.42 16.32a1 1 0 0 0 .608 0l6.844-2.464a.5.5 0 0 0 .035-.927l-3.213-1.27-4.13 1.632a2 2 0 0 1-1.46 0l-4.131-1.632z"/></svg>
                </span>

            <label class="tab" for="r-journals">
                <span class="ico" aria-hidden="true">
                    <svg viewBox="0 0 16 16"><path d="M5 10.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5m0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5"/><path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-1h1v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v1H1V2a2 2 0 0 1 2-2"/><path d="M1 5v-.5a.5.5 0 0 1 1 0V5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0V8h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0v.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1z"/></svg>
                </span>

            <label class="tab" for="r-contact">
                <span class="ico" aria-hidden="true">
                    <svg viewBox="0 0 16 16"><path d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.6 17.6 0 0 0 4.168 6.608 17.6 17.6 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.68.68 0 0 0-.58-.122l-2.19.547a1.75 1.75 0 0 1-1.657-.459L5.482 8.062a1.75 1.75 0 0 1-.46-1.657l.548-2.19a.68.68 0 0 0-.122-.58zM1.884.511a1.745 1.745 0 0 1 2.612.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z"/></svg>
                </span>
                Contact

        </nav>

        <!-- ============================================================
             PANELS — each tab file is fetched once and its HTML is
             inlined here. The tab files themselves use the standard
             iframe-injection pattern to pull in per-article fragments
             from articles/. Using fetch instead of <iframe> for the
             outer wrapper avoids the nested-iframe race where an inner
             fragment can occasionally double-inject.
             Adding/editing content = touch a fragment under articles/.
             ============================================================ -->
        <section class="panel" data-tab="intro"     data-include="IntroLog.html"></section>
        <section class="panel" data-tab="portfolio" data-include="PortfolioWorks.html"></section>
        <section class="panel" data-tab="journals"  data-include="TechnicalJournals.html"></section>
        <section class="panel" data-tab="contact"   data-include="Contact.html"></section>

        <!-- ============================================================
             FOOT
             ============================================================ -->
        <div class="foot">
            <span>// Digital Logbook v2</span>
            <span>HTML + CSS, some JS, <b>no frameworks</b></span>
        </div>
    </main>

    <!-- Floating "↑ Top" pill. Uses native anchor scroll to #top. -->
    <a href="#top" class="jump-top" aria-label="Jump to top">&uarr; Top</a>

    <!-- ============================================================
         Tiny enhancement script. Three jobs:
         1. fetch+inline the tab wrapper files (IntroLog, PortfolioWorks,
            TechnicalJournals, Contact) so any iframe-injection cascades
            happen in the parent document directly, avoiding the
            nested-iframe race.
         2. Auto-inject a "↑ Collapse" button at the end of each
            expanded article/studio body after iframe injection finishes.
         3. Re-run Prism whenever new <pre><code> lands in the page.
         ============================================================ -->
    <script>
        (function () {
            // ----- 1) inline tab wrapper files -----
            // Track each panel's full readiness (fetch + every inner
            // iframe's onload-inlining finished) so we can fade the
            // body in only once nothing else is about to pop in.
            function waitForIframes(root) {
                var frames = root.querySelectorAll('iframe');
                if (!frames.length) return Promise.resolve();
                return Promise.all(Array.prototype.map.call(frames, function (f) {
                    return new Promise(function (resolve) {
                        // addEventListener (not f.onload =) so the inline
                        // onload="..." handler that does the inlining still runs.
                        f.addEventListener('load', resolve, { once: true });
                        f.addEventListener('error', resolve, { once: true });
                    });
                }));
            }

            var includeJobs = Array.prototype.map.call(
                document.querySelectorAll('[data-include]'),
                function (el) {
                    return fetch(el.dataset.include)
                        .then(function (r) { return r.text(); })
                        .then(function (html) {
                            el.innerHTML = html;
                            return waitForIframes(el);
                        })
                        .catch(function () { /* never block the fade-in on a bad fetch */ });
                }
            );

            var revealed = false;
            function reveal() {
                if (revealed) return;
                revealed = true;
                // Add the class directly; the CSS transition handles the smoothness.
                // (Avoid requestAnimationFrame here — rAF is throttled/suspended in
                // background tabs and inside non-rendered preview iframes, which would
                // leave the body permanently invisible.)
                document.body.classList.add('ready');
            }
            Promise.all(includeJobs).then(reveal);
            // Safety net: reveal anyway if something hangs.
            setTimeout(reveal, 2000);

            // ----- deep-linking: sync URL hash <-> selected tab -----
            // Valid hashes: #intro, #portfolio, #journals, #contact
            function applyHashToTab() {
                var name = (location.hash || '').replace(/^#/, '');
                if (!name) return;
                var radio = document.getElementById('r-' + name);
                if (radio && radio.classList.contains('tab-route')) radio.checked = true;
            }
            applyHashToTab();
            window.addEventListener('hashchange', applyHashToTab);
            document.querySelectorAll('.tab-route').forEach(function (radio) {
                radio.addEventListener('change', function () {
                    if (!radio.checked) return;
                    var name = radio.id.replace(/^r-/, '');
                    // 'intro' is the default landing tab — keep its URL clean (no #intro).
                    var target = name === 'intro'
                        ? location.pathname + location.search
                        : '#' + name;
                    if ((location.hash || location.pathname + location.search) !== target) {
                        // Use replaceState so tab clicks don't clutter browser history.
                        // Back/forward still works across explicit hash navigations from outside.
                        if (history.replaceState) history.replaceState(null, '', target);
                        else if (name !== 'intro') location.hash = name;
                    }
                });
            });

            // ----- shared lightbox (lazy-built on first open, reused after) -----
            var lightbox = null;
            var lightboxState = { images: [], index: 0 };
            function buildLightbox() {
                lightbox = document.createElement('div');
                lightbox.className = 'img-lightbox';
                lightbox.innerHTML =
                    '<button type="button" class="img-lightbox-prev" aria-label="Previous image">&lsaquo;</button>' +
                    '<img class="img-lightbox-img" alt="">' +
                    '<button type="button" class="img-lightbox-next" aria-label="Next image">&rsaquo;</button>' +
                    '<button type="button" class="img-lightbox-close" aria-label="Close">&times;</button>';
                document.body.appendChild(lightbox);
                // swap the lightbox image without flashing the previous one.
                // We replace the entire <img> element each time — the old element (with its
                // cached bitmap) is removed from the DOM so it can never paint, and the new
                // element stays visibility:hidden until its decode promise resolves.
                // (Firefox doesn't reliably honour visibility:hidden on an img during a
                // display:none → display:flex transition, hence the element-swap approach.)
                var setLightboxImg = function (src) {
                    var fresh = document.createElement('img');
                    fresh.className = 'img-lightbox-img';
                    fresh.alt = '';
                    fresh.onclick = function (e) { e.stopPropagation(); };
                    fresh.style.visibility = 'hidden';
                    fresh.src = src;
                    var current = lightbox.querySelector('.img-lightbox-img');
                    if (current) current.parentNode.replaceChild(fresh, current);
                    else lightbox.appendChild(fresh);
                    var reveal = function () { fresh.style.visibility = ''; };
                    if (fresh.decode) {
                        fresh.decode().then(reveal, reveal);
                    } else {
                        fresh.onload = reveal;
                        fresh.onerror = reveal;
                    }
                };
                var lbStep = function (delta) {
                    var n = lightboxState.images.length;
                    if (!n) return;
                    lightboxState.index = (lightboxState.index + delta + n) % n;
                    setLightboxImg(lightboxState.images[lightboxState.index]);
                };
                // expose to the outer scope so openLightbox can use it too
                lightbox._setImg = setLightboxImg;
                lightbox.querySelector('.img-lightbox-prev').onclick = function (e) { e.stopPropagation(); lbStep(-1); };
                lightbox.querySelector('.img-lightbox-next').onclick = function (e) { e.stopPropagation(); lbStep(1); };
                lightbox.querySelector('.img-lightbox-close').onclick = function (e) { e.stopPropagation(); closeLightbox(); };
                lightbox.onclick = function () { closeLightbox(); }; // backdrop
                document.addEventListener('keydown', function (e) {
                    if (!lightbox.classList.contains('open')) return;
                    if (e.key === 'Escape') closeLightbox();
                    else if (e.key === 'ArrowLeft') lbStep(-1);
                    else if (e.key === 'ArrowRight') lbStep(1);
                });
            }
            function openLightbox(images, startIndex) {
                if (!lightbox) buildLightbox();
                lightboxState.images = images.slice();
                lightboxState.index = startIndex || 0;
                lightbox._setImg(lightboxState.images[lightboxState.index]);
                var hasMany = lightboxState.images.length > 1;
                lightbox.querySelector('.img-lightbox-prev').style.display = hasMany ? '' : 'none';
                lightbox.querySelector('.img-lightbox-next').style.display = hasMany ? '' : 'none';
                lightbox.classList.add('open');
            }
            function closeLightbox() {
                if (lightbox) lightbox.classList.remove('open');
            }

            // path helpers — convention: append "_sm" before the extension for inline display variants
            function smallSrc(src) { return src.replace(/(\.[^.]+)(?:[?#].*)?$/, '_sm$1'); }
            function fullSrc(src) { return src.replace(/_sm(\.[^.]+)(?:[?#].*)?$/, '$1'); }

            // ----- 2) collapse buttons + 3) Prism rehighlight -----
            var pendingPrism;
            function enhance(root) {
                root.querySelectorAll('article details > .article-content, article.studio-card details > .detail-body').forEach(function (body) {
                    if (body.querySelector(':scope > .collapse-link')) return;
                    var btn = document.createElement('button');
                    btn.className = 'collapse-link';
                    btn.type = 'button';
                    btn.innerHTML = '&uarr; Collapse';
                    btn.onclick = function () {
                        var d = btn.closest('details');
                        d.open = false;
                        d.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    };
                    body.appendChild(btn);
                });

                // sync each img-compare slider's initial --pos to its `value` attribute
                root.querySelectorAll('.img-compare-range').forEach(function (input) {
                    var container = input.parentElement;
                    if (container) container.style.setProperty('--pos', input.value + '%');
                });

                // wire any standalone .img-zoomable image to open in the shared lightbox
                // the inline src is the _sm variant; lightbox shows the full-res original
                root.querySelectorAll('.img-zoomable').forEach(function (img) {
                    if (img.dataset.zoomReady) return;
                    img.dataset.zoomReady = '1';
                    img.addEventListener('click', function () {
                        openLightbox([fullSrc(img.currentSrc || img.src)], 0);
                    });
                });

                // wire each img-carousel: prev/next stepping + click-to-enlarge
                root.querySelectorAll('.img-carousel').forEach(function (carousel) {
                    if (carousel.dataset.carouselReady) return;
                    carousel.dataset.carouselReady = '1';
                    var images;
                    try { images = JSON.parse(carousel.dataset.images || '[]'); }
                    catch (e) { images = []; }
                    if (!images.length) return;
                    var img = carousel.querySelector('.img-carousel-img');
                    var step = function (delta) {
                        var i = (parseInt(carousel.dataset.index, 10) || 0);
                        i = (i + delta + images.length) % images.length;
                        carousel.dataset.index = i;
                        // inline display uses the _sm variant; lightbox opens the full-res original (data-images array)
                        img.src = smallSrc(images[i]);
                    };
                    var prev = carousel.querySelector('.img-carousel-prev');
                    var next = carousel.querySelector('.img-carousel-next');
                    if (prev) prev.onclick = function () { step(-1); };
                    if (next) next.onclick = function () { step(1); };
                    img.onclick = function () {
                        openLightbox(images, parseInt(carousel.dataset.index, 10) || 0);
                    };
                });

                if (window.Prism) {
                    clearTimeout(pendingPrism);
                    pendingPrism = setTimeout(function () { Prism.highlightAll(); }, 80);
                }
            }

            new MutationObserver(function (muts) {
                muts.forEach(function (m) {
                    m.addedNodes.forEach(function (n) {
                        if (n.nodeType === 1) enhance(n);
                    });
                });
            }).observe(document.body, { childList: true, subtree: true });

            enhance(document);
        })();
    </script>
</body>

</html>
